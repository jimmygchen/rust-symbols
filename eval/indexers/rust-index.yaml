name: rust-index
setup_command: "cargo run --manifest-path {workspace}/../rust-index/Cargo.toml --release -- {workspace} --skip-statics"
system_prompt_extra: |
  You have a code index available in .ai/index/ with these files:
  - symbols.txt: One line per public symbol. Format: name|kind|path|signature
  - symbols/<crate>.txt: Same as above, split per crate
  - crates.txt: All workspace crates. Format: crate|path|internal_deps
  - modules.txt: Module-level overview. Format: crate|module|file|pub_count|kinds|doc

  USAGE RULES:
  - ALWAYS grep these files, NEVER read them fully (they are large)
  - Use anchored patterns: grep "^SyncManager" for types, grep "^BeaconChain::import" for methods
  - Use crates.txt to find which crate contains what
  - After finding a symbol via index, grep the source file for the signature to find the exact line, then read for context

  Example: to find where BeaconChain::import_block is defined:
    grep "^BeaconChain::import" .ai/index/symbols.txt
  This returns: BeaconChain::import_block|fn|beacon_node/beacon_chain/src/beacon_chain.rs|pub fn import_block...
files:
  - .ai/index/symbols.txt
  - .ai/index/crates.txt
  - .ai/index/modules.txt
